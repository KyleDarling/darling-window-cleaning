<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Darling Window Cleaning</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;

    }

    .container {
      max-width: 600px;
      margin: 60px auto;
      background: white;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    img {
      width: 150px;
      margin-bottom: 20px;
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      color: #555;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 15px 25px;
      background: #007BFF;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
    }

    .btn:hover {
      background: #0056b3;
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- LOGO -->
    <img src="/images/logo.png" alt="Darling Window Cleaning Logo">

    <!-- TITLE -->
    <h1>Darling Window Cleaning</h1>

    <!-- SUBTEXT -->
    <p>Streak-free windows. Same-day service. Easy booking.</p>

    <!-- CALL BUTTON -->
    <a class="btn" href="tel:9497046019">
      Call (949) 704-6019
    </a>

</html>
